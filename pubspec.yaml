name: ponto_azul
description: Aplicativo Flutter para registro de ponto com GPS, SQLite e sincronização simulada.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  sqflite: ^2.4.2+1
  path: ^1.9.1
  connectivity_plus: ^7.1.1
  intl: ^0.20.2
  uuid: ^4.5.3
  flutter_tts: ^4.2.5
  geocoding: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
